basic:
  seed: 42
  gpu: 0
  dataset: pretrain
  path: results/
  nb_workers: 1
ds:
  basic:
    task: classification
    dataset: MFTP
    split: false
    pretrain_path: results/pretrain/fold1_batch128_epoch200/best_model_state_dict.pt
  loss_fn:
    loss: NT_Xent
  model:
    input_channel: 16
    output_channel: 2
  train_params:
    fold: 1
    batch: 64
    epoch: 200
    lr: 0.001
    weight_decay: 0.0001
    temperature: 0.1
  r_savepath:
    path: results/${ds.basic.dataset}/fold${ds.train_params.fold}_batch${ds.train_params.batch}_epoch${ds.train_params.epoch}
optimizer:
  name: Adam
  lr: 0.0001
  weight_decay: 1.0e-07
